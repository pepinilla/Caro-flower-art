name: CaroFlower Content Automation

on:
  schedule:
    - cron: "0 14 */2 * *"   # cada 2 días a las 9am Colombia (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install openai @supabase/supabase-js nodemailer

      - name: Generate blog post
        run: node scripts/generate-blog.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL: "https://caroflower.com"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_REPO: "pepinilla/Caro-flower-art"
          GITHUB_BRANCH: "main"

      - name: Commit & push blog post
        run: |
          git config user.name "caroflower-bot"
          git config user.email "actions@users.noreply.github.com"
          git add blog/posts sitemap.xml robots.txt feed.xml
          git diff --staged --quiet || git commit -m "🌸 Auto blog post $(date '+%Y-%m-%d')"
          git push

      - name: Send email notification to clients
        run: node scripts/notify-email.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SITE_BASE_URL: "https://caroflower.com"
        continue-on-error: true
