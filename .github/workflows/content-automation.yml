name: CaroFlower Content Automation

on:
  schedule:
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install openai

      - name: Generate blog posts (EN+ES)
        run: node scripts/generate-blog-and-social.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL: "https://caroflower.com"

      - name: Commit & push changes
        run: |
          git config user.name "caroflower-bot"
          git config user.email "actions@users.noreply.github.com"
          git add blog sitemap.xml robots.txt header.html
          git diff --staged --quiet || git commit -m "Auto: new blog post"
          git push
