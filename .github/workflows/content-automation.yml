name: CaroFlower Content Automation

on:
  schedule:
    - cron: "0 3 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install openai @supabase/supabase-js

      - name: Generate blog post
        run: node scripts/generate-blog-and-social.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_BASE_URL: "https://caroflower.com"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Commit & push changes
        run: |
          git config user.name "caroflower-bot"
          git config user.email "actions@users.noreply.github.com"

          git add blog/posts sitemap.xml robots.txt feed.xml blog/last_post.json

          git diff --staged --quiet || git commit -m "Auto blog post"
          git push
