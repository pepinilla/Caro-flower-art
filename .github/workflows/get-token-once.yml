name: Get Pinterest Token (run once)

on:
  workflow_dispatch:

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange code for Pinterest access token
        run: |
          RESPONSE=$(curl -s -X POST "https://api.pinterest.com/v5/oauth/token" \
            -H "Authorization: Basic $(echo -n '${{ secrets.PINTEREST_APP_ID }}:${{ secrets.PINTEREST_APP_SECRET }}' | base64 -w 0)" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=authorization_code&code=470e8d48f90ca5311a1183f4ea13e1b35c7501cc&redirect_uri=https://caroflower.com/get-pinterest-token.html")
          
          echo "Response: $RESPONSE"
          
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR: '+str(d)))")
          
          echo "::notice::ACCESS TOKEN = $ACCESS_TOKEN"
