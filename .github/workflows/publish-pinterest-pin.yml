name: Publish Pinterest Pin

on:
  workflow_run:
    workflows: ["CaroFlower Content Automation"]
    types: [completed]

permissions:
  contents: read

jobs:
  pinterest:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (same commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Publish pin to Pinterest
        run: node scripts/publish-pinterest-pin.js
        env:
          SITE_BASE_URL: "https://caroflower.com"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}

      # Opcional: si quieres ver logs más claros cuando falle
      - name: Done
        run: echo "Pinterest workflow finished"
