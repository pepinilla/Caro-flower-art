<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Blog | Caro Flower Art</title>
  <meta name="description" content="Historias detrás de las flores de papel artesanales de Caro. Proceso, inspiración y piezas únicas hechas con amor."/>
  <link rel="canonical" href="https://caroflower.com/blog/"/>
  <meta property="og:title" content="Blog | Caro Flower Art"/>
  <meta property="og:description" content="Historias detrás del arte floral artesanal."/>
  <link rel="stylesheet" href="/site.css?v=20260126b"/>
  <style>
    /* ── HERO ── */
    .blog-hero{
      position:relative;
      text-align:center;
      padding:80px 20px 60px;
      overflow:hidden;
    }
    .blog-hero::before{
      content:'';
      position:absolute;inset:0;
      background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,154,166,.28) 0%, transparent 70%);
      pointer-events:none;
    }
    .blog-hero-tag{
      display:inline-block;
      background:var(--secondary-color);
      color:var(--primary-dark);
      font-size:12px;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
      padding:5px 16px;
      border-radius:999px;
      margin-bottom:18px;
    }
    .blog-hero h1{
      font-size:clamp(2.4rem,6vw,3.8rem);
      margin:0 0 14px;
      line-height:1.1;
    }
    .blog-hero p{
      max-width:600px;
      margin:0 auto 28px;
      opacity:.75;
      font-size:1.05rem;
      line-height:1.7;
    }

    /* ── FILTER PILLS ── */
    .blog-filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin-bottom:40px;
    }
    .pill{
      padding:7px 18px;
      border-radius:999px;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      border:1.5px solid var(--border-color);
      background:#fff;
      color:var(--text-color);
      transition:all .2s;
    }
    .pill:hover,.pill.active{
      background:var(--primary-color);
      border-color:var(--primary-color);
      color:#fff;
    }

    /* ── GRID ── */
    .blog-section{ max-width:1200px; margin:0 auto; padding:0 20px 60px; }

    .blog-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:28px;
    }

    /* ── CARD ── */
    .blog-card{
      background:#fff;
      border-radius:20px;
      overflow:hidden;
      text-decoration:none;
      color:inherit;
      box-shadow:0 8px 24px rgba(0,0,0,.07);
      border:1px solid rgba(0,0,0,.05);
      transition:transform .25s ease, box-shadow .25s ease;
      display:flex;
      flex-direction:column;
    }
    .blog-card:hover{
      transform:translateY(-5px);
      box-shadow:0 16px 40px rgba(232,154,166,.25);
    }
    .blog-card-img{
      width:100%;
      aspect-ratio:4/3;
      object-fit:cover;
      object-position:center;
      display:block;
      background:var(--secondary-color);
    }
    .blog-card-body{
      padding:20px;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .blog-card-cat{
      font-size:11px;
      font-weight:600;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--primary-dark);
    }
    .blog-card-title{
      font-family:var(--font-title);
      font-size:1.25rem;
      line-height:1.3;
      margin:0;
      color:var(--dark-color);
    }
    .blog-card-excerpt{
      font-size:.88rem;
      opacity:.7;
      line-height:1.6;
      margin:0;
      flex:1;
    }
    .blog-card-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(0,0,0,.06);
      font-size:12px;
      opacity:.6;
    }
    .blog-read-btn{
      display:inline-block;
      padding:8px 18px;
      background:var(--primary-color);
      color:#fff;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
      transition:background .2s;
    }
    .blog-card:hover .blog-read-btn{ background:var(--primary-dark); }

    /* ── FEATURED (first card big) ── */
    .blog-card.featured{
      grid-column: 1 / -1;
      flex-direction:row;
      max-height:320px;
    }
    @media(max-width:640px){
      .blog-card.featured{ flex-direction:column; max-height:none; }
    }
    .blog-card.featured .blog-card-img{
      width:45%;
      aspect-ratio:auto;
      flex-shrink:0;
    }
    @media(max-width:640px){
      .blog-card.featured .blog-card-img{ width:100%; aspect-ratio:16/9; }
    }
    .blog-card.featured .blog-card-title{ font-size:1.6rem; }

    /* ── EMPTY ── */
    .blog-empty{
      text-align:center;
      padding:60px 20px;
      opacity:.6;
      font-size:1.1rem;
    }

    /* ── WHATSAPP FLOAT ── */
    .wa-float{
      position:fixed;
      bottom:24px; right:24px;
      background:#25d366;
      color:#fff;
      border-radius:999px;
      padding:13px 20px;
      font-size:14px;
      font-weight:600;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:8px;
      box-shadow:0 6px 20px rgba(37,211,102,.4);
      z-index:1000;
      transition:transform .2s, box-shadow .2s;
    }
    .wa-float:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 28px rgba(37,211,102,.5);
    }
    .wa-float svg{ width:20px; height:20px; fill:#fff; flex-shrink:0; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <!-- HERO -->
  <section class="blog-hero">
    <div class="blog-hero-tag">🌸 Stories & Process</div>
    <h1>The Caro Flower Art Blog</h1>
    <p>Behind-the-scenes stories, floral inspiration, and the handmade process behind each piece.</p>
  </section>

  <!-- FILTERS -->
  <div class="blog-filters" id="filters">
    <button class="pill active" data-cat="all">All</button>
    <button class="pill" data-cat="roses">Roses 🌹</button>
    <button class="pill" data-cat="tulips">Tulips 🌷</button>
    <button class="pill" data-cat="peonies">Peonies 🌺</button>
    <button class="pill" data-cat="hydrangeas">Hydrangeas 💙</button>
    <button class="pill" data-cat="carnations">Carnations 🌸</button>
    <button class="pill" data-cat="bouquets">Bouquets 💐</button>
    <button class="pill" data-cat="wedding">Wedding 💍</button>
  </div>

  <!-- GRID -->
  <div class="blog-section">
    <div id="blog-grid" class="blog-grid"></div>
    <div id="blog-empty" class="blog-empty" style="display:none">
      🌸 New stories coming soon...
    </div>
  </div>

  <!-- WHATSAPP FLOAT -->
  <a class="wa-float" href="https://wa.me/12368189725?text=Hola%20Caro!%20Vi%20tu%20blog%20y%20me%20encanta%20tu%20arte%20🌸%20Quisiera%20cotizar%20una%20pieza." target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Cotizar pieza
  </a>

  <script src="/site.js?v=20260126b"></script>
  <script>
    const WA = "https://wa.me/12368189725";

    async function loadPosts(filterCat = "all") {
      const container = document.getElementById("blog-grid");
      const empty = document.getElementById("blog-empty");
      container.innerHTML = "";

      let urls = [];
      try {
        const res = await fetch("/sitemap.xml", { cache: "no-store" });
        const xml = await res.text();
        const doc = new DOMParser().parseFromString(xml, "text/xml");
        urls = [...doc.querySelectorAll("loc")]
          .map(n => n.textContent.trim())
          .filter(u => u.includes("/blog/posts/"))
          .reverse()
          .slice(0, 30);
      } catch(e) {
        empty.style.display = "block";
        return;
      }

      if (!urls.length) { empty.style.display = "block"; return; }

      const parser = new DOMParser();
      let count = 0;

      for (const [i, link] of urls.entries()) {
        try {
          const html = await (await fetch(link, { cache: "no-store" })).text();
          const doc = parser.parseFromString(html, "text/html");

          const title = (doc.querySelector("meta[property='og:title']")?.content || "")
            .replace(" | Caro Flower Art","").trim() ||
            doc.querySelector("title")?.textContent.replace(" | Caro Flower Art","").trim() ||
            "Caro Flower Art";

          const cover = doc.querySelector("meta[property='og:image']")?.content ||
            doc.querySelector("img")?.src || "";

          const date = (doc.querySelector("meta[name='article:published_time']")?.content || "").slice(0,10);

          // Detect category from URL
          const catMatch = link.match(/\/posts\/([^-]+)-/);
          const cat = catMatch ? catMatch[1].toLowerCase() : "mix";

          if (filterCat !== "all" && cat !== filterCat) continue;

          const excerpt = doc.querySelector("meta[name='description']")?.content || 
            "A handmade story from Caro Flower Art.";

          const isFeatured = count === 0;
          const card = document.createElement("a");
          card.href = link;
          card.className = "blog-card" + (isFeatured ? " featured" : "");

          const waMsg = encodeURIComponent(`Hola Caro! Vi tu post "${title}" y me encantó 🌸 Quisiera cotizar algo similar.`);

          card.innerHTML = `
            ${cover ? `<img class="blog-card-img" src="${cover}" alt="${title}" loading="lazy" decoding="async"/>` : ""}
            <div class="blog-card-body">
              <div class="blog-card-cat">${cat} 🌸</div>
              <h3 class="blog-card-title">${title}</h3>
              <p class="blog-card-excerpt">${excerpt}</p>
              <div class="blog-card-footer">
                <span>${date || "New"}</span>
                <span class="blog-read-btn">Read →</span>
              </div>
            </div>
          `;

          container.appendChild(card);
          count++;
        } catch(e) { /* skip */ }
      }

      if (!container.children.length) empty.style.display = "block";
    }

    // Filter pills
    document.getElementById("filters").addEventListener("click", e => {
      const pill = e.target.closest(".pill");
      if (!pill) return;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      loadPosts(pill.dataset.cat);
    });

    loadPosts();
  </script>
</body>
</html>
