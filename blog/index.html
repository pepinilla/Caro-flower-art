<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <title>Blog | Caro Flower Art</title>
  <meta name="description" content="Behind the scenes of handmade paper flowers."/>
  <link rel="canonical" href="https://caroflower.com/blog/"/>

  <link rel="stylesheet" href="/site.css?v=20260126b"/>

  <style>
    /* Centrado general */
    .hero-content, .section-head { text-align: center; }
    .blog-grid { justify-items: center; }
    .blog-card { text-align: center; }
    .blog-card-body { text-align: center; }

    /* Botón Read centrado */
    .blog-card-cta { display:flex; justify-content:center; gap:10px; }

    /* Si tu CSS ya tiene estos, no pasa nada: esto solo refuerza */
    .section-subtitle { margin-left:auto; margin-right:auto; max-width: 720px; }
  </style>
</head>

<body>

<div id="site-header"></div>

<section class="hero hero-small blog-hero">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>Blog</h1>

    <!-- (Quitado “English first… / Español después”) -->
  </div>
</section>

<section class="gallery">
  <div class="section-head">
    <h2>Latest Stories</h2>

    <p class="section-subtitle">
      Short behind-the-scenes stories, materials, and process.
    </p>
  </div>

  <div id="blog-grid" class="blog-grid"></div>
</section>

<script src="/site.js?v=20260126b"></script>

<script>
  async function loadPosts() {
    const res = await fetch("/sitemap.xml", { cache: "no-store" });
    const xml = await res.text();

    const parser = new DOMParser();
    const data = parser.parseFromString(xml, "text/xml");

    const urls = [...data.querySelectorAll("loc")]
      .map(n => n.textContent.trim())
      .filter(u => u.includes("/blog/posts/"));

    // newest first
    urls.reverse();

    const container = document.getElementById("blog-grid");
    container.innerHTML = "";

    // limit (cambia si quieres)
    const limited = urls.slice(0, 24);

    for (const link of limited) {
      try {
        // Importante: si el post fue borrado (404), lo saltamos
        const postRes = await fetch(link, { cache: "no-store" });
        if (!postRes.ok) continue;

        const html = await postRes.text();
        const doc = parser.parseFromString(html, "text/html");

        const title =
          (doc.querySelector("meta[property='og:title']")?.content || "").trim() ||
          (doc.querySelector("title")?.textContent || "").replace(" | Caro Flower Art","").trim() ||
          "Caro Flower Art";

        const cover =
          doc.querySelector("meta[property='og:image']")?.content ||
          doc.querySelector("img")?.src ||
          "";

        // intenta sacar fecha del contenido si existe
        const dateText =
          (doc.querySelector(".post-meta")?.textContent || "").trim();

        const card = document.createElement("a");
        card.href = link;
        card.className = "blog-card";

        card.innerHTML = `
          <div class="blog-card-media">
            ${cover ? `<img src="${cover}" alt="${title}" loading="lazy"/>` : `<div class="blog-card-placeholder"></div>`}
          </div>

          <div class="blog-card-body">
            <div class="blog-card-meta">
              <span>${dateText || "New"}</span>
              <span class="dot">•</span>
              <span>Caro Flower Art</span>
            </div>

            <h3 class="blog-card-title">${title}</h3>

            <p class="blog-card-desc">
              Read the story behind this handmade flower.
            </p>

            <div class="blog-card-cta">
              <span class="blog-read">Read</span>
            </div>
          </div>
        `;

        container.appendChild(card);
      } catch (e) {
        // skip broken post
      }
    }
  }

  loadPosts();
</script>

</body>
</html>
