<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Blog | Caro Flower Art</title>

<meta name="description" content="Behind the scenes of handmade paper flowers."/>
<link rel="canonical" href="https://caroflower.com/blog/"/>

<link rel="stylesheet" href="/site.css?v=20260126b"/>

</head>


<body>

<div id="site-header"></div>

<section class="hero hero-small">
  <div class="hero-overlay"></div>

  <div class="hero-content">

    <h1>
      Blog
      <span class="es">Historias</span>
    </h1>

    <p>
      English first · Español después
      <span class="es">Inglés primero · Español después</span>
    </p>

  </div>
</section>



<section class="gallery">

<h2>
Latest Stories
<span class="es">Historias recientes</span>
</h2>

<div id="blog-grid" class="blog-grid"></div>

</section>



<script src="/site.js"></script>

<script>

async function loadPosts(){

const res = await fetch("/sitemap.xml")
const xml = await res.text()

const parser = new DOMParser()
const data = parser.parseFromString(xml,"text/xml")

const urls = [...data.querySelectorAll("loc")]
.filter(el=>el.textContent.includes("/blog/posts/"))

const container = document.getElementById("blog-grid")

urls.reverse().forEach(url=>{

const link = url.textContent

const slug = link.split("/").pop().replace(".html","")

const title = slug
.replaceAll("-"," ")
.replace(/\b\w/g,l=>l.toUpperCase())

const card = document.createElement("a")

card.href = link
card.className = "blog-card"

card.innerHTML = `

<div class="blog-card-inner">

<h3>${title}</h3>

<p>
Read the story behind this handmade flower.
<span class="es">Lee la historia detrás de esta flor hecha a mano.</span>
</p>

</div>

`

container.appendChild(card)

})

}

loadPosts()

</script>



</body>
</html>
