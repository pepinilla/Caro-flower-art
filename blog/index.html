<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <title>Blog | Caro Flower Art</title>
  <meta name="description" content="Stories behind handmade paper flowers."/>

  <link rel="stylesheet" href="/site.css?v=20260126b"/>

  <style>
    .blog-hero h1{
      text-align:center;
      font-size:44px;
      margin:0 0 10px 0;
      letter-spacing:.5px;
    }

    .blog-hero p{
      text-align:center;
      opacity:.75;
      max-width:720px;
      margin:0 auto;
      line-height:1.6;
    }

    .section-head{
      text-align:center;
      margin:34px 0 40px;
    }

    .section-head h2{
      margin:0 0 10px 0;
      font-size:28px;
    }

    .section-head p{
      margin:0 auto;
      max-width:780px;
      opacity:.75;
      line-height:1.6;
    }

    .blog-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:26px;
      align-items:stretch;
    }

    .blog-card{
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      text-decoration:none;
      color:inherit;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      transition:transform .2s ease, box-shadow .2s ease;
      border:1px solid rgba(0,0,0,.06);
      display:flex;
      flex-direction:column;
    }

    .blog-card:hover{
      transform:translateY(-3px);
      box-shadow:0 14px 34px rgba(0,0,0,.10);
    }

    .blog-card-media img{
      width:100%;
      display:block;
      aspect-ratio: 4 / 3;
      object-fit:cover;
    }

    .blog-card-body{
      padding:18px 18px 20px;
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
      justify-content:center;
    }

    .blog-card-meta{
      opacity:.70;
      font-size:13px;
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
    }

    .blog-card-meta .dot{ opacity:.45; }

    .blog-card-title{
      font-size:20px;
      margin:0;
      line-height:1.25;
    }

    .blog-card-desc{
      margin:0;
      opacity:.72;
      line-height:1.55;
    }

    .blog-read{
      display:inline-block;
      margin-top:6px;
      padding:9px 16px;
      border-radius:999px;
      background:rgba(0,0,0,.06);
      font-weight:700;
      font-size:13px;
    }

    .blog-empty{
      text-align:center;
      opacity:.7;
      padding:40px 0;
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <section class="hero hero-small blog-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Blog</h1>
      <p>Stories behind handmade paper flowers — behind the scenes, materials, and process.</p>
    </div>
  </section>

  <section class="gallery">
    <div class="section-head">
      <h2>Latest Stories</h2>
      <p>Short behind-the-scenes stories that share details, textures, and the care behind each handmade piece.</p>
    </div>

    <div id="blog-grid" class="blog-grid"></div>
    <div id="blog-empty" class="blog-empty" style="display:none;">No posts yet.</div>
  </section>

  <script src="/site.js?v=20260126b"></script>

  <script>
    async function loadPosts(){
      const container = document.getElementById("blog-grid");
      const empty = document.getElementById("blog-empty");

      container.innerHTML = "";

      const res = await fetch("/sitemap.xml", { cache: "no-store" });
      const xml = await res.text();

      const parser = new DOMParser();
      const data = parser.parseFromString(xml, "text/xml");

      let urls = [...data.querySelectorAll("loc")]
        .map(n => (n.textContent || "").trim())
        .filter(u => u.includes("/blog/posts/"));

      // newest first
      urls.reverse();

      // limit (cambia si quieres)
      urls = urls.slice(0, 24);

      if (!urls.length){
        empty.style.display = "block";
        return;
      }

      // fetch each post and extract real title + cover + date
      for (const link of urls){
        try{
          const html = await (await fetch(link, { cache: "no-store" })).text();
          const doc = parser.parseFromString(html, "text/html");

          const title =
            (doc.querySelector("meta[property='og:title']")?.content || "").trim() ||
            (doc.querySelector("title")?.textContent || "").replace(" | Caro Flower Art","").trim() ||
            "Caro Flower Art";

          const cover =
            doc.querySelector("meta[property='og:image']")?.content ||
            doc.querySelector("img")?.src ||
            "";

          const date =
            (doc.querySelector("meta[name='article:published_time']")?.content || "").slice(0,10);

          const card = document.createElement("a");
          card.href = link;
          card.className = "blog-card";

          card.innerHTML = `
            <div class="blog-card-media">
              ${cover ? `<img src="${cover}" alt="${title}" loading="lazy"/>` : ``}
            </div>

            <div class="blog-card-body">
              <div class="blog-card-meta">
                <span>${date ? date : "New"}</span>
                <span class="dot">•</span>
                <span>Caro Flower Art</span>
              </div>

              <h3 class="blog-card-title">${title}</h3>

              <p class="blog-card-desc">
                Read the story behind this handmade flower.
              </p>

              <div class="blog-read">Read</div>
            </div>
          `;

          container.appendChild(card);
        }catch(e){
          // Si el post no existe o da error, lo saltamos (evita que aparezca "Page not found")
        }
      }

      if (!container.children.length){
        empty.style.display = "block";
      }
    }

    loadPosts();
  </script>
</body>
</html>
