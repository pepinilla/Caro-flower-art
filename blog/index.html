<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Blog | Caro Flower Art</title>
<meta name="description" content="Stories behind handmade paper flowers."/>

<link rel="stylesheet" href="/site.css?v=20260126b"/>

<style>

.blog-hero h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.blog-hero p{
text-align:center;
opacity:.7;
}

.section-head{
text-align:center;
margin-bottom:40px;
}

.blog-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.blog-card{
background:#fff;
border-radius:18px;
overflow:hidden;
text-decoration:none;
color:inherit;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.2s;
}

.blog-card:hover{
transform:translateY(-3px);
}

.blog-card-media img{
width:100%;
display:block;
}

.blog-card-body{
padding:18px;
text-align:center;
}

.blog-card-title{
font-size:20px;
margin:10px 0;
}

.blog-card-desc{
opacity:.7;
}

.blog-read{
display:inline-block;
margin-top:12px;
padding:8px 16px;
border-radius:20px;
background:#eee;
font-weight:600;
}

</style>

</head>

<body>

<div id="site-header"></div>

<section class="hero hero-small blog-hero">

<h1>Blog</h1>

<p>
Stories behind handmade paper flowers
</p>

</section>


<section class="gallery">

<div class="section-head">

<h2>Latest Stories</h2>

<p>
Behind the scenes, materials, and process.
</p>

</div>

<div id="blog-grid" class="blog-grid"></div>

</section>


<script src="/site.js?v=20260126b"></script>

<script>

async function loadPosts(){

const res = await fetch("/sitemap.xml",{cache:"no-store"});
const xml = await res.text();

const parser = new DOMParser();
const data = parser.parseFromString(xml,"text/xml");

const urls=[...data.querySelectorAll("loc")]
.map(n=>n.textContent.trim())
.filter(u=>u.includes("/blog/posts/"));

urls.reverse();

const container=document.getElementById("blog-grid");
container.innerHTML="";

const limited=urls.slice(0,24);

for(const link of limited){

try{

const html=await (await fetch(link,{cache:"no-store"})).text();
const doc=parser.parseFromString(html,"text/html");

const title=
doc.querySelector("meta[property='og:title']")?.content ||
doc.querySelector("title")?.textContent ||
"Caro Flower Art";

const cover=
doc.querySelector("meta[property='og:image']")?.content ||
doc.querySelector("img")?.src ||
"";

const card=document.createElement("a");
card.href=link;
card.className="blog-card";

card.innerHTML=`

<div class="blog-card-media">

${cover ? `<img src="${cover}" alt="${title}" loading="lazy"/>` : ``}

</div>

<div class="blog-card-body">

<h3 class="blog-card-title">${title}</h3>

<p class="blog-card-desc">

Read the story behind this handmade flower.

</p>

<span class="blog-read">

Read

</span>

</div>

`;

container.appendChild(card);

}catch(e){

}

}

}

loadPosts();

</script>

</body>
</html>
